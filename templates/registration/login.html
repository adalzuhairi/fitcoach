{% extends "base.html" %}
{% block title %}Connexion — FitCoach{% endblock %}

{% block body %}
<div class="flex min-h-screen items-center justify-center px-4">
  <div class="w-full max-w-sm">
    <div class="mb-6 text-center">
      <h1 class="text-2xl font-bold text-slate-900">FitCoach</h1>
      <p class="mt-1 text-sm text-slate-500">Connecte-toi pour accéder à ton coaching.</p>
    </div>

    <form method="post" class="rounded-xl bg-white p-6 shadow-sm ring-1 ring-slate-100">
      {% csrf_token %}

      {% if form.non_field_errors %}
        <div class="mb-4 rounded-xl bg-red-50 px-4 py-3 text-sm text-red-700">
          Identifiants invalides. Réessaie.
        </div>
      {% endif %}

      <div class="mb-4">
        <label for="{{ form.username.id_for_label }}" class="mb-1 block text-sm font-medium text-slate-700">Nom d'utilisateur</label>
        <input type="text" name="{{ form.username.html_name }}" id="{{ form.username.id_for_label }}" autofocus required
               class="w-full rounded-xl border border-slate-300 px-3 py-2 focus:border-accent focus:outline-none focus:ring-2 focus:ring-accent/30">
      </div>
      <div class="mb-4">
        <label for="{{ form.password.id_for_label }}" class="mb-1 block text-sm font-medium text-slate-700">Mot de passe</label>
        <input type="password" name="{{ form.password.html_name }}" id="{{ form.password.id_for_label }}" required
               class="w-full rounded-xl border border-slate-300 px-3 py-2 focus:border-accent focus:outline-none focus:ring-2 focus:ring-accent/30">
      </div>

      <button type="submit" class="w-full rounded-xl bg-accent px-4 py-2 font-semibold text-white hover:bg-blue-700">
        Se connecter
      </button>
    </form>
  </div>
</div>
{% endblock %}
