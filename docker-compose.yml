# Base commune dev + prod (db, redis, web). Ne définit AUCUNE spécificité
# d'environnement : pas de ports publiés, pas de volume de code, pas de commande.
# Ces différences vivent dans les surcouches :
#
#   Dev  : docker compose up
#          → merge automatique avec docker-compose.override.yml
#
#   Prod : docker compose -f docker-compose.yml -f docker-compose.prod.yml \
#                         --env-file .env.prod up -d --build
#
# (Ne PAS lancer ce fichier seul : web n'a ni commande ni port en l'état.)

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fitcoach}
      POSTGRES_USER: ${POSTGRES_USER:-fitcoach}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fitcoach}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fitcoach}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
