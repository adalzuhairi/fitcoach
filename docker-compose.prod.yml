# Surcouche PRODUCTION pour FitCoach — à layerer SUR docker-compose.yml.
#
# Usage :
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml \
#                  --env-file .env.prod up -d --build
#
# Ne contient QUE les différences avec la base :
#   - aucun port publié sur l'hôte (le reverse proxy TRAEFIK atteint "web" via le
#     réseau Docker externe "frontend" et termine le TLS — HTTPS public :4443,
#     certificat Let's Encrypt via DNS challenge Infomaniak)
#   - pas de montage du code (l'image est figée)
#   - Gunicorn via entrypoint.sh (attend la DB, migrate, collectstatic)
#   - volumes persistants (redis, media) et restart automatique
#
# ⚠️ À vérifier côté VM (doivent matcher ta config Traefik) :
#   - le nom du réseau Docker externe de Traefik  → "frontend" ci-dessous
#   - le nom du certresolver                       → "infomaniak" ci-dessous

services:
  db:
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD requis}

  redis:
    restart: unless-stopped
    volumes:
      - redis_data:/data

  web:
    restart: unless-stopped
    entrypoint: ["/app/entrypoint.sh"]
    command:
      ["gunicorn", "config.wsgi:application", "--bind", "0.0.0.0:8000", "--workers", "3", "--timeout", "60"]
    env_file:
      - .env.prod
    environment:
      DJANGO_DEBUG: "False"
      DJANGO_USE_REDIS: "True"
      DJANGO_USE_POSTGRES: "True"
    volumes:
      - media_data:/app/media
    # web est sur deux réseaux :
    #   - default  : pour joindre db et redis (privé)
    #   - frontend : partagé avec Traefik (reverse proxy)
    networks:
      - default
      - frontend
    labels:
      - "traefik.enable=true"
      # Réseau que Traefik doit utiliser pour router (obligatoire en multi-réseaux).
      - "traefik.docker.network=frontend"
      - "traefik.http.routers.fitcoach.rule=Host(`fitcoach.infotechno.eu`)"
      - "traefik.http.routers.fitcoach.entrypoints=websecure"
      - "traefik.http.routers.fitcoach.tls=true"
      - "traefik.http.routers.fitcoach.tls.certresolver=infomaniak"
      - "traefik.http.services.fitcoach.loadbalancer.server.port=8000"

volumes:
  redis_data:
  media_data:

networks:
  # Réseau partagé avec Traefik, créé en dehors de cette stack.
  # ⚠️ Le nom doit correspondre EXACTEMENT au réseau de ton Traefik.
  frontend:
    external: true
