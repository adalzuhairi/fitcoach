{% extends "base.html" %}
{% block title %}Séance — {{ workout_day.nom }}{% endblock %}

{% block body %}
{{ seance_data|json_script:"seance-data" }}

<div x-data="seanceApp()" x-cloak class="mx-auto max-w-xl px-4 pb-40 pt-6">

  <div class="mb-1 flex items-center justify-between">
    <a href="{% url 'training:programme' %}" class="text-sm text-muted transition hover:text-text">← Programme</a>
  </div>
  <h1 class="text-xl font-bold text-text">{{ workout_day.nom }}</h1>
  <p class="mt-1 text-sm text-muted" x-text="`${setsFaits()} séries enregistrées`"></p>

  <!-- Exercices -->
  <div class="mt-5 space-y-4">
    <template x-for="ex in exercices" :key="ex.weId">
      <div class="card p-4">
        <div class="mb-1 flex items-baseline justify-between gap-2">
          <h2 class="font-semibold text-text" x-text="ex.nom"></h2>
          <span class="shrink-0 text-sm text-muted" x-text="ex.cible"></span>
        </div>

        <!-- Badge : exercice remplacé pour aujourd'hui (programme intact) -->
        <template x-if="ex.substitution">
          <div class="mb-2">
            <p class="flex flex-wrap items-center gap-x-2 gap-y-1 text-xs">
              <span class="rounded-full bg-accent/15 px-2 py-0.5 font-medium text-accent">
                Remplacé · au lieu de <span x-text="ex.substitution.original"></span>
              </span>
              <button type="button" @click="demanderAnnulation(ex)"
                      class="font-medium text-muted underline-offset-2 transition hover:text-text hover:underline">
                Annuler
              </button>
            </p>
            <!-- Confirmation : l'annulation efface les séries faites sur le substitut -->
            <template x-if="confirmUndo[ex.weId]">
              <div class="mt-2 rounded-lg border border-amber-500/30 bg-amber-500/10 p-2.5 text-sm">
                <p class="text-text">
                  <span x-text="confirmUndo[ex.weId]"></span> série(s) enregistrée(s) sur le substitut seront supprimées. Annuler le remplacement ?
                </p>
                <div class="mt-2 flex gap-2">
                  <button type="button" @click="confirmerAnnulation(ex)"
                          class="rounded-lg bg-accent px-3 py-1.5 text-xs font-semibold text-white transition hover:brightness-110">Oui, annuler</button>
                  <button type="button" @click="annulerConfirmationUndo(ex)"
                          class="rounded-lg bg-white/5 px-3 py-1.5 text-xs font-medium text-text transition hover:bg-surface-2">Non, garder</button>
                </div>
              </div>
            </template>
          </div>
        </template>

        <p class="mb-2 text-xs text-muted">
          repos <span x-text="ex.repos"></span> s
          <template x-if="ex.suggestion !== null">
            <span> · charge suggérée <span class="font-medium text-perf" x-text="ex.suggestion + ' kg'"></span></span>
          </template>
          <template x-if="ex.notes"><span> · <span x-text="ex.notes"></span></span></template>
        </p>

        <!-- Comment exécuter ? — guide débutant, replié par défaut (discret) -->
        <template x-if="ex.guide.aGuide">
          <div x-data="{ open: false }" class="mb-3">
            <button type="button" @click="open = !open" :aria-expanded="open"
                    class="flex items-center gap-1.5 text-xs font-medium text-accent transition hover:brightness-110">
              <span x-text="open ? '▾' : '▸'" class="inline-block w-2 text-center"></span>
              Comment exécuter ?
            </button>
            <div x-show="open" x-transition x-cloak
                 class="mt-2 space-y-3 rounded-lg border border-border bg-surface-2 p-3 text-sm">
              <template x-if="ex.guide.execution">
                <div>
                  <p class="mb-0.5 text-xs font-semibold uppercase tracking-wide text-muted">Positionnement &amp; exécution</p>
                  <p class="whitespace-pre-line text-muted" x-text="ex.guide.execution"></p>
                </div>
              </template>
              <template x-if="ex.guide.securite">
                <div>
                  <p class="mb-0.5 text-xs font-semibold uppercase tracking-wide text-perf">Sécurité</p>
                  <p class="whitespace-pre-line text-muted" x-text="ex.guide.securite"></p>
                </div>
              </template>
              <template x-if="ex.guide.erreurs">
                <div>
                  <p class="mb-0.5 text-xs font-semibold uppercase tracking-wide text-amber-400">Erreurs fréquentes</p>
                  <p class="whitespace-pre-line text-muted" x-text="ex.guide.erreurs"></p>
                </div>
              </template>
              <div>
                <p class="mb-0.5 text-xs font-semibold uppercase tracking-wide text-muted">Muscles ciblés</p>
                <p class="text-muted">
                  <span class="font-medium text-text" x-text="ex.guide.musclePrimaire"></span><template x-if="ex.guide.musclesSecondaires"><span> · <span x-text="ex.guide.musclesSecondaires"></span></span></template>
                </p>
              </div>
            </div>
          </div>
        </template>

        <!-- Séries -->
        <div class="space-y-2">
          <template x-for="serie in ex.series" :key="serie.numero">
            <div class="flex items-center gap-2 rounded-lg px-2 py-1.5"
                 :class="serie.fait ? 'bg-emerald-500/10 ring-1 ring-emerald-500/20' : 'bg-surface-2'">
              <span class="w-6 shrink-0 text-center text-sm font-semibold text-muted" x-text="serie.numero"></span>

              <div class="flex flex-1 items-center gap-2">
                <input type="number" inputmode="numeric" min="0" placeholder="reps"
                       x-model="serie.reps"
                       class="w-full rounded-lg border border-border bg-bg px-2 py-2 text-center text-text placeholder:text-muted focus:border-accent focus:outline-none focus:ring-2 focus:ring-accent/30">
                <input type="number" inputmode="decimal" step="0.5" min="0" placeholder="kg"
                       x-model="serie.charge"
                       class="w-full rounded-lg border border-border bg-bg px-2 py-2 text-center text-text placeholder:text-muted focus:border-accent focus:outline-none focus:ring-2 focus:ring-accent/30">
              </div>

              <button @click="enregistrer(ex, serie)"
                      class="shrink-0 rounded-lg px-3 py-2 text-sm font-semibold text-white transition"
                      :class="serie.fait ? 'bg-emerald-600 hover:bg-emerald-500' : 'bg-accent hover:brightness-110'"
                      x-text="serie.fait ? '✓' : 'OK'"></button>
            </div>
          </template>
        </div>

        <!-- Remplacer l'exercice (discret) — panneau d'alternatives -->
        <div class="mt-3">
          <button type="button" @click="ouvrirAlternatives(ex)"
                  class="text-xs font-medium text-muted underline-offset-2 transition hover:text-text hover:underline">
            Cet exercice ne me convient pas ?
          </button>

          <div x-show="alts[ex.weId] !== undefined" x-transition x-cloak
               class="mt-2 rounded-lg border border-border bg-surface-2 p-3">
            <p class="mb-2 text-xs font-semibold uppercase tracking-wide text-muted">Remplacer par</p>

            <!-- Confirmation : le remplacement efface les séries déjà faites sur ce créneau -->
            <template x-if="confirmSub[ex.weId]">
              <div class="mb-2 rounded-lg border border-amber-500/30 bg-amber-500/10 p-2.5 text-sm">
                <p class="text-text">
                  <span x-text="confirmSub[ex.weId].count"></span> série(s) déjà enregistrée(s) seront supprimées. Continuer ?
                </p>
                <div class="mt-2 flex gap-2">
                  <button type="button" @click="confirmerSubstitution(ex)"
                          class="rounded-lg bg-accent px-3 py-1.5 text-xs font-semibold text-white transition hover:brightness-110">Continuer</button>
                  <button type="button" @click="annulerConfirmationSub(ex)"
                          class="rounded-lg bg-white/5 px-3 py-1.5 text-xs font-medium text-text transition hover:bg-surface-2">Annuler</button>
                </div>
              </div>
            </template>

            <template x-if="altsLoading[ex.weId]">
              <p class="text-sm text-muted">Chargement…</p>
            </template>

            <template x-if="!altsLoading[ex.weId] && (alts[ex.weId] || []).length === 0">
              <p class="text-sm text-muted">Aucune alternative dans la bibliothèque pour ce muscle.</p>
            </template>

            <div class="space-y-1.5">
              <template x-for="alt in (alts[ex.weId] || [])" :key="alt.id">
                <button type="button" @click="choisirAlternative(ex, alt.id)"
                        class="flex w-full items-center justify-between gap-2 rounded-lg bg-bg px-3 py-2 text-left transition hover:ring-1 hover:ring-accent/40">
                  <span class="text-sm font-medium text-text" x-text="alt.nom"></span>
                  <span class="shrink-0 text-xs text-muted">
                    <span x-text="alt.type"></span>
                    <template x-if="alt.materielDifferent">
                      <span class="ml-1 text-amber-400" :title="'Matériel : ' + alt.materiel">· autre matériel</span>
                    </template>
                  </span>
                </button>
              </template>
            </div>

            <button type="button" @click="fermerAlternatives(ex)"
                    class="mt-2 text-xs text-muted underline-offset-2 hover:text-text hover:underline">
              Fermer
            </button>
          </div>
        </div>
      </div>
    </template>
  </div>

  <!-- Terminer la séance -->
  <form method="post" action="{% url 'training:terminer_seance' log.id %}"
        class="card mt-6 p-4">
    {% csrf_token %}
    <h2 class="mb-3 font-semibold text-text">Terminer la séance</h2>
    <div class="grid grid-cols-2 gap-3">
      <label class="text-sm text-muted">Durée (min)
        <input type="number" name="duree_minutes" min="0"
               class="mt-1 w-full rounded-lg border border-border bg-surface-2 px-2 py-2 text-text focus:border-accent focus:outline-none">
      </label>
      <label class="text-sm text-muted">Ressenti (1-5)
        <input type="number" name="ressenti" min="1" max="5"
               class="mt-1 w-full rounded-lg border border-border bg-surface-2 px-2 py-2 text-text focus:border-accent focus:outline-none">
      </label>
    </div>
    <textarea name="notes" rows="2" placeholder="Notes (optionnel)"
              class="mt-3 w-full rounded-lg border border-border bg-surface-2 px-2 py-2 text-sm text-text placeholder:text-muted focus:border-accent focus:outline-none"></textarea>
    <button type="submit" class="btn-primary mt-3 w-full">
      Enregistrer la séance
    </button>
  </form>

  <!-- Barre chrono de repos (collée en bas) -->
  <div x-show="restRunning" x-cloak
       class="fixed inset-x-0 bottom-0 z-40 border-t border-border bg-surface/95 px-4 py-3 backdrop-blur">
    <div class="mx-auto flex max-w-xl items-center gap-3">
      <span class="text-sm text-muted">Repos</span>
      <span class="text-2xl font-bold tabular-nums text-perf" x-text="restLabel()"></span>
      <div class="ml-auto flex gap-2">
        <button @click="addRest(15)" class="rounded-lg bg-white/5 px-3 py-2 text-sm font-medium text-text hover:bg-surface-2">+15 s</button>
        <button @click="stopRest()" class="rounded-lg bg-accent px-3 py-2 text-sm font-semibold text-white hover:brightness-110">Passer</button>
      </div>
    </div>
  </div>
</div>

<script>
function seanceApp() {
  const data = JSON.parse(document.getElementById("seance-data").textContent);
  return {
    logId: data.logId,
    exercices: data.exercices,
    restSeconds: 0,
    restRunning: false,
    _interval: null,
    // Panneaux d'alternatives, indexés par weId : `alts[weId]` est défini
    // (tableau, éventuellement vide) quand le panneau est ouvert.
    alts: {},
    altsLoading: {},
    // Confirmations en attente (effacement de séries), indexées par weId :
    // `confirmSub[weId]` = {exerciseId, count} ; `confirmUndo[weId]` = count.
    confirmSub: {},
    confirmUndo: {},

    init() {
      this.exercices.forEach((ex) => this.prefillUn(ex));
    },

    // Pré-remplit la charge des séries non faites avec la suggestion.
    prefillUn(ex) {
      if (ex.suggestion === null) return;
      ex.series.forEach((s) => {
        if (!s.fait && (s.charge === null || s.charge === "")) s.charge = ex.suggestion;
      });
    },

    // Remplace en place le bloc d'exercice renvoyé par le serveur (substituer/annuler).
    _remplacerBloc(nouveau) {
      const i = this.exercices.findIndex((e) => e.weId === nouveau.weId);
      if (i === -1) return;
      this.exercices.splice(i, 1, nouveau);
      this.prefillUn(nouveau);
    },

    async ouvrirAlternatives(ex) {
      this.altsLoading[ex.weId] = true;
      this.alts[ex.weId] = this.alts[ex.weId] || [];
      try {
        // URL dérivée de Django (préfixe /entrainement/) plutôt que codée en dur.
        const url = "{% url 'training:alternatives' 0 %}".replace(
          /0\/alternatives\/$/, `${ex.weId}/alternatives/`
        );
        const resp = await fetch(url);
        if (resp.ok) this.alts[ex.weId] = (await resp.json()).alternatives;
      } catch (e) {
        /* hors-ligne : on laisse le panneau vide */
      } finally {
        this.altsLoading[ex.weId] = false;
      }
    },
    fermerAlternatives(ex) {
      delete this.alts[ex.weId];
    },

    // Remplacement : si des séries sont déjà faites, on demande confirmation
    // avant d'effacer (elles portaient sur l'ancien mouvement) ; sinon direct.
    choisirAlternative(ex, exerciseId) {
      const faits = ex.series.filter((s) => s.fait).length;
      if (faits > 0) {
        this.confirmSub[ex.weId] = { exerciseId, count: faits };
        return;
      }
      this._faireSubstitution(ex, exerciseId);
    },
    confirmerSubstitution(ex) {
      const c = this.confirmSub[ex.weId];
      if (!c) return;
      delete this.confirmSub[ex.weId];
      this._faireSubstitution(ex, c.exerciseId);
    },
    annulerConfirmationSub(ex) { delete this.confirmSub[ex.weId]; },

    async _faireSubstitution(ex, exerciseId) {
      try {
        const resp = await fetch("{% url 'training:substituer' %}", {
          method: "POST",
          headers: { "Content-Type": "application/json", "X-CSRFToken": "{{ csrf_token }}" },
          body: JSON.stringify({ logId: this.logId, weId: ex.weId, exerciseId }),
        });
        if (!resp.ok) return;
        this.fermerAlternatives(ex);
        this._remplacerBloc((await resp.json()).exercice);
      } catch (e) {
        /* hors-ligne : on n'interrompt pas l'utilisateur */
      }
    },

    // Annulation (undo) : même garde, les séries faites sur le substitut sont perdues.
    demanderAnnulation(ex) {
      const faits = ex.series.filter((s) => s.fait).length;
      if (faits > 0) {
        this.confirmUndo[ex.weId] = faits;
        return;
      }
      this._faireAnnulation(ex);
    },
    confirmerAnnulation(ex) {
      delete this.confirmUndo[ex.weId];
      this._faireAnnulation(ex);
    },
    annulerConfirmationUndo(ex) { delete this.confirmUndo[ex.weId]; },

    async _faireAnnulation(ex) {
      try {
        const resp = await fetch("{% url 'training:annuler_substitution' %}", {
          method: "POST",
          headers: { "Content-Type": "application/json", "X-CSRFToken": "{{ csrf_token }}" },
          body: JSON.stringify({ logId: this.logId, weId: ex.weId }),
        });
        if (!resp.ok) return;
        this._remplacerBloc((await resp.json()).exercice);
      } catch (e) {
        /* hors-ligne : on n'interrompt pas l'utilisateur */
      }
    },

    setsFaits() {
      return this.exercices.reduce((n, ex) => n + ex.series.filter((s) => s.fait).length, 0);
    },

    async enregistrer(ex, serie) {
      if (serie.reps === "" || serie.reps === null || serie.charge === "" || serie.charge === null) {
        return;
      }
      try {
        const resp = await fetch("{% url 'training:enregistrer_serie' %}", {
          method: "POST",
          headers: { "Content-Type": "application/json", "X-CSRFToken": "{{ csrf_token }}" },
          body: JSON.stringify({
            logId: this.logId,
            weId: ex.weId,
            serie: serie.numero,
            reps: serie.reps,
            charge: serie.charge,
          }),
        });
        if (!resp.ok) return;
        serie.fait = true;
        this.startRest(ex.repos);
      } catch (e) {
        /* hors-ligne : on n'interrompt pas l'utilisateur */
      }
    },

    startRest(seconds) {
      clearInterval(this._interval);
      this.restSeconds = seconds;
      this.restRunning = true;
      this._interval = setInterval(() => {
        this.restSeconds -= 1;
        if (this.restSeconds <= 0) this._finRepos();
      }, 1000);
    },
    addRest(n) { this.restSeconds += n; },
    stopRest() { clearInterval(this._interval); this.restRunning = false; this.restSeconds = 0; },
    _finRepos() {
      clearInterval(this._interval);
      this.restRunning = false;
      if (navigator.vibrate) navigator.vibrate([300, 100, 300]);
      this._beep();
    },
    restLabel() {
      const s = Math.max(0, this.restSeconds);
      const m = Math.floor(s / 60);
      return (m > 0 ? m + ":" : "") + String(s % 60).padStart(m > 0 ? 2 : 1, "0") + (m > 0 ? "" : " s");
    },
    _beep() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = 880; gain.gain.value = 0.1;
        osc.start();
        setTimeout(() => { osc.stop(); ctx.close(); }, 350);
      } catch (e) { /* audio indisponible */ }
    },
  };
}
</script>
{% endblock %}
